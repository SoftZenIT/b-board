<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>b-board — Vanilla Example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      textarea {
        width: 100%;
        height: 120px;
        font-size: 1.1rem;
        padding: 0.5rem;
        margin-bottom: 1rem;
      }
      .controls {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      select,
      button {
        padding: 0.4rem 0.8rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>b-board Vanilla Example</h1>
    <div class="controls">
      <select id="lang-select">
        <option value="yoruba">Yoruba</option>
        <option value="fon-adja">Fon / Adja</option>
        <option value="baatonum">Baatɔnum</option>
        <option value="dendi">Dendi</option>
      </select>
      <select id="theme-select">
        <option value="auto">Auto</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>
    <textarea id="output" placeholder="Characters appear here..."></textarea>
    <benin-keyboard id="kb" language="yoruba" theme="auto"></benin-keyboard>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
